<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- De Stijl / Mondrian inspired favicon for Monarch Times -->
  <rect width="32" height="32" fill="#FFFFFF"/>

  <!-- Grid lines -->
  <rect x="0" y="0" width="32" height="32" fill="none" stroke="#000000" stroke-width="2"/>
  <line x1="12" y1="0" x2="12" y2="32" stroke="#000000" stroke-width="2"/>
  <line x1="22" y1="0" x2="22" y2="32" stroke="#000000" stroke-width="2"/>
  <line x1="0" y1="10" x2="32" y2="10" stroke="#000000" stroke-width="2"/>
  <line x1="0" y1="22" x2="32" y2="22" stroke="#000000" stroke-width="2"/>

  <!-- Color blocks -->
  <rect x="1" y="1" width="10" height="8" fill="#FF0000"/>
  <rect x="23" y="1" width="8" height="8" fill="#0052FF"/>
  <rect x="1" y="23" width="10" height="8" fill="#FFD700"/>
  <rect x="23" y="11" width="8" height="10" fill="#000000"/>
  <rect x="13" y="23" width="8" height="8" fill="#9945FF"/>
</svg>
